name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Dogfood — lint the fixtures
        run: |
          node dist/cli.js fixtures/good-skill/
          node dist/cli.js fixtures/bad-skill/SKILL.md || true
      - name: Dogfood — bundled skill must pass its own linter
        run: node dist/cli.js check skills/vibe-check/SKILL.md --min-score 95
